<!-- ==========================================
     QEDEV Framework
     Loading Component
========================================== -->

<div
  id="qedev-loading"
  class="qedev-loading-overlay hidden"
  role="status"
  aria-live="polite"
>
  <div class="qedev-loading">
    <!-- Spinner -->
    <div class="qedev-loading-spinner" aria-hidden="true"></div>

    <!-- Message -->
    <div class="qedev-loading-message">Loading...</div>
  </div>
</div>
